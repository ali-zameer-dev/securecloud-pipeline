name: SecureCloud Security Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  sast-scan:
    name: "Security Gate 1 - SAST Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST Scan
        run: |
          mkdir -p reports
          python -m bandit -r src/ -f json -o reports/bandit-report.json || true
          python -m bandit -r src/ || true

      - name: Upload SAST Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: reports/bandit-report.json

  dependency-scan:
    name: "Security Gate 2 - Dependency Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Safety
        run: pip install safety

      - name: Run Safety Dependency Scan
        run: |
          mkdir -p reports
          pip install -r requirements.txt
          python -m safety check -r requirements.txt || true

  infra-scan:
    name: "Security Gate 3 - Infrastructure Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: json
          output_file_path: reports/checkov-report.json
        continue-on-error: true

      - name: Upload IaC Report
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: reports/checkov-report.json

  container-scan:
    name: "Security Gate 4 - Container Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t securecloud-app .

      - name: Run Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: securecloud-app
          format: json
          output: reports/trivy-report.json
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Upload Container Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: reports/trivy-report.json

  security-summary:
    name: "Security Summary Report"
    runs-on: ubuntu-latest
    needs: [sast-scan, dependency-scan, infra-scan, container-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install bandit safety

      - name: Generate Security Summary
        run: |
          echo "=========================================="
          echo "   SECURECLOUD SECURITY SCAN SUMMARY"
          echo "=========================================="
          echo ""
          echo "GATE 1 - SAST SCAN (Bandit):"
          python -m bandit -r src/ --severity-level medium || true
          echo ""
          echo "GATE 2 - DEPENDENCY SCAN (Safety):"
          python -m safety check -r requirements.txt || true
          echo ""
          echo "=========================================="
          echo "  Scan Complete - Review findings above"
          echo "=========================================="
